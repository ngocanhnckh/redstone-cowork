appId: com.example.cowork
productName: Redstone Cowork
copyright: © Redstone

directories:
  output: dist
  buildResources: build

# Restore +x on node-pty's spawn-helper (its prebuild ships it non-executable),
# otherwise the packaged app throws `posix_spawnp failed` when opening a terminal.
afterPack: build/afterPack.cjs

# electron-vite emits the app to out/; ship that plus the manifest. Production
# node_modules (node-pty, the native PTY) are pulled in automatically.
files:
  - out/**/*
  - package.json
  - "!**/*.map"
  # node-pty's locally-compiled build/ (host-only binary) and Windows debug symbols
  # aren't needed — the ABI-stable prebuilds/ are what load at runtime. Dropping them
  # avoids shipping a wrong-platform binary and ~40MB of .pdb bloat.
  - "!**/node_modules/node-pty/build/**"
  - "!**/node_modules/node-pty/**/*.pdb"

# node-pty ships a compiled .node binary that cannot live inside the asar archive
# — it must be unpacked so the OS can dlopen it at runtime. Scope it to node-pty
# (a broad **/*.node glob traverses the pnpm workspace and errors).
# node-mac-permissions (macOS-only; requests the app-attributed Calendar TCC prompt)
# likewise ships a compiled permissions.node that must be dlopen-able outside the asar.
asarUnpack:
  - "**/node_modules/node-pty/**"
  - "**/node_modules/node-mac-permissions/**"

# The offline GeoIP database (DB-IP City Lite, CC BY 4.0) for the Network Map widget.
# Fetched by `pnpm --filter @rcw/desktop geoip` (gitignored, not in the repo), copied
# into the packaged app's resources dir so main/geoip.ts can read it at process.resourcesPath.
extraResources:
  - from: resources/geoip
    to: geoip
    filter: ["*.mmdb"]

# DON'T recompile native modules. node-pty ships N-API prebuilds (one pty.node per
# platform, ABI-stable across Node AND Electron) for darwin + win32, so recompiling
# is unnecessary — and recompiling is the ONLY thing that needs a per-platform C++
# toolchain. With this off, every target (including Windows) packages from the Mac
# with no Visual Studio / node-gyp / Python involved.
npmRebuild: false

mac:
  category: public.app-category.developer-tools
  # Arch defaults to the runner's own (arm64 on macos-latest, x64 on macos-13) —
  # node-pty is native and can't be cross-compiled, so each arch builds on its
  # own runner (see the release workflow matrix).
  target:
    - dmg
    - zip
  # Unsigned builds: allow the app to run without a hardened-runtime signature.
  identity: null
  # Usage strings shown in the macOS permission prompts. The Agenda widget reads the
  # system calendar via EventKit; without these the prompt has no rationale (and on
  # recent macOS the request can be denied outright). Both the legacy and the
  # Sonoma+ "full access" keys are provided so the prompt appears on every version.
  extendInfo:
    NSCalendarsUsageDescription: Redstone Cowork shows your upcoming events in the Agenda widget.
    NSCalendarsFullAccessUsageDescription: Redstone Cowork shows your upcoming events in the Agenda widget.
    # Face-scan sequence on the YITEC login + in-app video calls. Without this key
    # macOS terminates the process on first camera access instead of prompting.
    NSCameraUsageDescription: Redstone Cowork uses the camera for the sign-in face scan.
    NSMicrophoneUsageDescription: Redstone Cowork uses the microphone for calls in the workspace browser.

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-Setup.${ext}

linux:
  category: Development
  maintainer: Redstone <admin@example.com>
  # Name outputs from productName — the default used the scoped package name
  # (@rcw/desktop), whose "/" made the .deb write into a missing subdirectory.
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
