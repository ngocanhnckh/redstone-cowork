packages:
  - "apps/*"
  - "packages/*"

# Dependencies allowed to run install/build scripts (pnpm 10 reads this from the
# workspace file). node-mac-permissions compiles a native addon here (no prebuild);
# the rest ship prebuilds or postinstall steps that must run.
onlyBuiltDependencies:
  - "@nestjs/core"
  - "@swc/core"
  - electron
  - esbuild
  - "@tailwindcss/oxide"
  - node-pty
  - node-mac-permissions
