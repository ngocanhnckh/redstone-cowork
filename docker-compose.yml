services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rcw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rcw
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rcw"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgres://rcw:${POSTGRES_PASSWORD}@postgres:5432/rcw
      INSTANCE_TOKEN: ${INSTANCE_TOKEN}
      CRED_ENCRYPTION_KEY: ${CRED_ENCRYPTION_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@example.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      OAUTH_REDIRECT_BASE: ${OAUTH_REDIRECT_BASE:-https://cowork.example.com}
      OPENAI_TEXT_BASE_URL: ${OPENAI_TEXT_BASE_URL:-}
      OPENAI_TEXT_KEY: ${OPENAI_TEXT_KEY:-}
      OPENAI_TEXT_MODEL: ${OPENAI_TEXT_MODEL:-}
      OPENAI_FLASH_BASE_URL: ${OPENAI_FLASH_BASE_URL:-}
      OPENAI_FLASH_KEY: ${OPENAI_FLASH_KEY:-}
      OPENAI_FLASH_MODEL: ${OPENAI_FLASH_MODEL:-}
      OPENAI_VISION_BASE_URL: ${OPENAI_VISION_BASE_URL:-}
      OPENAI_VISION_KEY: ${OPENAI_VISION_KEY:-}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-}
      LLM_MAX_CONTEXT_TOKENS: ${LLM_MAX_CONTEXT_TOKENS:-12000}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-1024}
      TAVILY_KEY: ${TAVILY_KEY:-}
      REDSTONE_ISSUER: ${REDSTONE_ISSUER:-}
      REDSTONE_CLIENT_ID: ${REDSTONE_CLIENT_ID:-}
      REDSTONE_CLIENT_SECRET: ${REDSTONE_CLIENT_SECRET:-}
      # Enterprise accounts (first-boot admin seed + login-screen branding).
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-}
      ORG_NAME: ${ORG_NAME:-}
      ACCOUNT_IDLE_MINUTES: ${ACCOUNT_IDLE_MINUTES:-30}
      # Jira DC OAuth 2.0 (employee sign-in via the org Jira; Slice 2b).
      JIRA_OAUTH_BASE_URL: ${JIRA_OAUTH_BASE_URL:-}
      JIRA_OAUTH_CLIENT_ID: ${JIRA_OAUTH_CLIENT_ID:-}
      JIRA_OAUTH_CLIENT_SECRET: ${JIRA_OAUTH_CLIENT_SECRET:-}
      JIRA_OAUTH_SCOPE: ${JIRA_OAUTH_SCOPE:-WRITE}
      JIRA_OAUTH_REDIRECT: ${JIRA_OAUTH_REDIRECT:-https://cowork.chatredstone.com/auth/jira/callback}
      JIRA_WEBHOOK_SECRET: ${JIRA_WEBHOOK_SECRET:-}
      COWORK_SSH_PUBKEY: ${COWORK_SSH_PUBKEY:-}
      COWORK_PUBLIC_URL: ${COWORK_PUBLIC_URL:-https://cowork.chatredstone.com}
      # NAT'd-host SSH relay (reverse tunnel via cowork server).
      RELAY_HOST: ${RELAY_HOST:-}
      RELAY_SSH_PORT: ${RELAY_SSH_PORT:-22}
      RCWTUN_USER: ${RCWTUN_USER:-rcwtun}
      RCWTUN_AUTHKEYS_PATH: ${RCWTUN_AUTHKEYS_PATH:-/rcwtun-ssh/authorized_keys}
    ports:
      - "${API_PORT:-47101}:3001"
    volumes:
      # rcwtun's ~/.ssh, so the API can manage authorized_keys for tunnel brokers.
      # Only mounted when the relay is set up (deploy/setup-relay.sh creates the dir).
      - ${RCWTUN_SSH_DIR:-/home/rcwtun/.ssh}:/rcwtun-ssh
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build: { context: ., dockerfile: apps/worker/Dockerfile }
    restart: unless-stopped
    environment:
      API_URL: http://api:3001
      INSTANCE_TOKEN: ${INSTANCE_TOKEN}
      HEARTBEAT_INTERVAL_MS: 60000
    depends_on:
      api: { condition: service_healthy }

  web:
    build: { context: ., dockerfile: apps/web/Dockerfile }
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:3001
      INSTANCE_TOKEN: ${INSTANCE_TOKEN}
      # Next.js standalone binds to $HOSTNAME; Docker defaults it to the container id,
      # which the container can fail to resolve (getaddrinfo EAI_AGAIN → crash-loop).
      # Pin to all-interfaces so the server always binds regardless of DNS.
      HOSTNAME: 0.0.0.0
    ports:
      - "${WEB_PORT:-47100}:3000"
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
